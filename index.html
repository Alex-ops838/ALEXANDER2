<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividad Canvas</title>
</head>
<body>

<h2>CREAR UN CUADRADO Y UN TRIÁNGULO</h2>

<canvas id="myCanvas" width="500" height="500" style="border:4px solid rgb(190, 184, 19);"></canvas>

<script>
var canvas = document.getElementById("myCanvas");
var ctx = canvas.getContext("2d");

// Color y grosor de línea
ctx.strokeStyle = "blue";
ctx.lineWidth = 3;

// 🔲 CUADRADO (arriba)
ctx.beginPath();
ctx.rect(180, 80, 140, 140); // posición centrada
ctx.stroke();

// ➖ LÍNEA DIVISORIA
ctx.beginPath();
ctx.moveTo(0, 250);
ctx.lineTo(500, 250);
ctx.stroke();

// 🔺 TRIÁNGULO (abajo)
ctx.beginPath();
ctx.moveTo(250, 300);   // vértice superior
ctx.lineTo(350, 420);   // derecha
ctx.lineTo(150, 420);   // izquierda
ctx.closePath();
ctx.stroke();

</script>

</body>
</html>
