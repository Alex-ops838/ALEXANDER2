<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Transformaciones 3D Interactivas</title>

<style>
body { margin: 0; overflow: hidden; background: black; }

/* Panel de instrucciones */
#info {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 10px;
    border-radius: 10px;
    font-family: Arial;
}
</style>

</head>
<body>

<div id="info">
🎮 CONTROLES:<br>
⬅️➡️ Mover X<br>
⬆️⬇️ Mover Y<br>
Q / E → Rotar<br>
+ / - → Escalar
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ESCENA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111122);

// CÁMARA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

// RENDER
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LUZ (REALISMO)
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

const ambient = new THREE.AmbientLight(0x404040);
scene.add(ambient);

// CUBO (con material realista)
const geometry = new THREE.BoxGeometry();
const material = new THREE.MeshStandardMaterial({ 
    color: 0x00ffcc,
    metalness: 0.5,
    roughness: 0.3
});
const cube = new THREE.Mesh(geometry, material);
scene.add(cube);

// CONTROLES
document.addEventListener("keydown", (e) => {

    switch(e.key.toLowerCase()) {

        // TRASLACIÓN
        case "arrowright": cube.position.x += 0.2; break;
        case "arrowleft": cube.position.x -= 0.2; break;
        case "arrowup": cube.position.y += 0.2; break;
        case "arrowdown": cube.position.y -= 0.2; break;

        // ROTACIÓN
        case "q": cube.rotation.y -= 0.1; break;
        case "e": cube.rotation.y += 0.1; break;

        // ESCALA
        case "+": case "=":
            cube.scale.set(
                cube.scale.x + 0.1,
                cube.scale.y + 0.1,
                cube.scale.z + 0.1
            );
        break;

        case "-":
            cube.scale.set(
                cube.scale.x - 0.1,
                cube.scale.y - 0.1,
                cube.scale.z - 0.1
            );
        break;
    }
});

// ANIMACIÓN
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}

animate();

// RESPONSIVE
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
